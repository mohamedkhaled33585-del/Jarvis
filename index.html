<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis — قاعدة معرفتك</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&family=Cairo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050505;
    --panel:#150a0c;
    --border:#3a161d;
    --text:#f5e9ea;
    --text-muted:#a3888c;
    --red:#e2263e;
    --red-dim:#e2263e26;
    --redglow:#ff3b3b;
    --redglow-dim:#ff3b3b22;
    --danger:#ff8a3d;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% -10%, #200a0d 0%, transparent 45%),
      radial-gradient(circle at 100% 0%, #14060780 0%, transparent 40%),
      var(--bg);
    color:var(--text);
    font-family:'Cairo', sans-serif;
    min-height:100vh;
  }
  .mono{font-family:'IBM Plex Mono', monospace;}
  ::selection{background:var(--red-dim);}
 
  /* ===== Header ===== */
  header{
    padding:28px 32px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
    flex-wrap:wrap;
    border-bottom:1px solid var(--border);
  }
  .brand{display:flex;align-items:center;gap:14px;}
  .brand-mark{
    width:42px;height:42px;border-radius:10px;
    background:linear-gradient(135deg,var(--red),#7a0f1a);
    display:flex;align-items:center;justify-content:center;
    font-family:'Tajawal';font-weight:900;font-size:20px;color:#1a0505;
    flex-shrink:0;
    box-shadow:0 4px 18px -4px #e2263e55;
  }
  .brand h1{
    font-family:'Tajawal';font-weight:900;font-size:22px;margin:0;letter-spacing:.2px;
  }
  .brand p{margin:2px 0 0;color:var(--text-muted);font-size:13px;}
 
  .search-wrap{
    position:relative;flex:1;min-width:220px;max-width:420px;
  }
  .search-wrap input{
    width:100%;background:var(--panel);border:1px solid var(--border);
    color:var(--text);border-radius:10px;padding:11px 42px 11px 14px;
    font-family:'Cairo';font-size:14px;outline:none;transition:border-color .15s;
  }
  .search-wrap input:focus{border-color:var(--red);}
  .search-wrap svg{position:absolute;right:14px;top:50%;transform:translateY(-50%);opacity:.5;}
 
  .btn-add{
    position:relative;overflow:hidden;
    background:var(--red);color:#1a0505;border:none;border-radius:10px;
    padding:11px 20px;font-family:'Cairo';font-weight:700;font-size:14px;
    cursor:pointer;display:flex;align-items:center;gap:8px;
    transition:transform .12s, box-shadow .12s;
    box-shadow:0 4px 16px -4px #e2263e40;
  }
  .btn-add:hover{transform:translateY(-1px);box-shadow:0 6px 20px -4px #e2263e66;}
  .btn-add:active{transform:translateY(0);}
 
  /* ===== Main ===== */
  main{padding:28px 32px 120px;max-width:1180px;margin:0 auto;}
  .section-label{
    display:flex;align-items:center;gap:10px;margin:6px 0 18px;color:var(--text-muted);
    font-size:13px;
  }
  .section-label .line{flex:1;height:1px;background:var(--border);}
 
  .grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;
  }
 
  /* Shipping-tag styled note card */
  .card{
    position:relative;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:18px 18px 16px;
    cursor:pointer;
    transition:border-color .15s, transform .15s;
    overflow:hidden;
  }
  .card::before{
    /* perforated stub edge */
    content:"";
    position:absolute;top:0;bottom:0;right:0;width:14px;
    background-image:radial-gradient(circle, var(--bg) 2.2px, transparent 2.3px);
    background-size:14px 14px;
    background-position:center;
    border-left:1px dashed var(--border);
  }
  .card:hover{border-color:#6a2530;transform:translateY(-2px);}
  .card .tag-id{
    position:absolute;top:12px;left:14px;
    font-size:10.5px;color:var(--text-muted);letter-spacing:.5px;
  }
  .card h3{
    font-family:'Tajawal';font-weight:700;font-size:16px;margin:8px 22px 8px 0;
    line-height:1.4;
  }
  .card p{
    color:var(--text-muted);font-size:13px;line-height:1.7;margin:0 22px 0 0;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
  }
  .card .barcode{
    display:flex;gap:2px;align-items:flex-end;margin-top:14px;margin-left:22px;height:14px;opacity:.55;
  }
  .card .barcode span{width:2px;background:var(--red);}
 
  .empty{
    text-align:center;padding:70px 20px;color:var(--text-muted);
  }
  .empty svg{opacity:.4;margin-bottom:14px;}
  .empty h3{font-family:'Tajawal';color:var(--text);margin:0 0 6px;}
 
  /* ===== Modal ===== */
  .overlay{
    position:fixed;inset:0;background:#03000180;backdrop-filter:blur(3px);
    display:flex;align-items:center;justify-content:center;z-index:50;
    opacity:0;pointer-events:none;transition:opacity .18s;
    padding:20px;
  }
  .overlay.open{opacity:1;pointer-events:auto;}
  .modal{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    width:100%;max-width:520px;padding:26px;
    transform:translateY(10px) scale(.98);transition:transform .18s;
    max-height:85vh;overflow-y:auto;
  }
  .overlay.open .modal{transform:translateY(0) scale(1);}
  .modal h2{font-family:'Tajawal';font-size:19px;margin:0 0 18px;display:flex;align-items:center;gap:10px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:13px;color:var(--text-muted);margin-bottom:7px;}
  .field input,.field textarea{
    width:100%;background:#0f0608;border:1px solid var(--border);border-radius:9px;
    color:var(--text);padding:11px 13px;font-family:'Cairo';font-size:14px;outline:none;resize:vertical;
    transition:border-color .15s;
  }
  .field input:focus,.field textarea:focus{border-color:var(--red);}
  .field textarea{min-height:120px;line-height:1.7;}
  .modal-actions{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap;}
  .btn-primary{
    position:relative;overflow:hidden;
    background:var(--red);color:#1a0505;border:none;border-radius:9px;padding:11px 18px;
    font-family:'Cairo';font-weight:700;font-size:14px;cursor:pointer;flex:1;
  }
  .btn-ghost{
    position:relative;overflow:hidden;
    background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:9px;
    padding:11px 18px;font-family:'Cairo';font-size:14px;cursor:pointer;
  }
  .btn-danger{
    position:relative;overflow:hidden;
    background:transparent;color:var(--danger);border:1px solid #ff8a3d55;border-radius:9px;
    padding:11px 18px;font-family:'Cairo';font-size:14px;cursor:pointer;
  }
  .detail-body{color:var(--text);font-size:14.5px;line-height:1.9;white-space:pre-wrap;margin-bottom:20px;}
  .detail-meta{color:var(--text-muted);font-size:12px;margin-bottom:14px;}
 
  /* ===== Assistant (Jarvis) ===== */
  .jarvis-btn{
    position:fixed;bottom:26px;left:26px;z-index:40;
    width:62px;height:62px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #2a0e12, #0b0304);
    border:1px solid #ff3b3b55;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:0 0 0 0 #ff3b3b33;
  }
  .jarvis-btn .ring{
    position:absolute;inset:-6px;border-radius:50%;border:1px solid #ff3b3b44;
    animation:spin 7s linear infinite;
  }
  .jarvis-btn .ring2{
    position:absolute;inset:-12px;border-radius:50%;border:1px dashed #ff3b3b2a;
    animation:spin 12s linear infinite reverse;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .jarvis-btn .core{
    width:22px;height:22px;border-radius:50%;
    background:radial-gradient(circle, var(--redglow), #8f0f0f);
    box-shadow:0 0 18px 2px #ff3b3b99;
    animation:pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:.8;transform:scale(1);}50%{opacity:1;transform:scale(1.12);}}
 
  /* click / press animations */
  .pulse-anim{ animation:pulseKick .35s ease; }
  @keyframes pulseKick{
    0%{transform:scale(1);}
    45%{transform:scale(.92);}
    100%{transform:scale(1);}
  }
  .jarvis-kick{ animation:jarvisKick .55s ease; }
  @keyframes jarvisKick{
    0%{transform:scale(1); box-shadow:0 0 0 0 #ff3b3b66;}
    35%{transform:scale(.86);}
    60%{box-shadow:0 0 0 16px #ff3b3b00;}
    100%{transform:scale(1); box-shadow:0 0 0 0 #ff3b3b00;}
  }
  .ripple{
    position:absolute;border-radius:50%;
    background:rgba(255,59,59,0.45);
    transform:scale(0);
    opacity:1;
    pointer-events:none;
    transition:transform .5s ease, opacity .5s ease;
  }
 
  .chat-panel{
    position:fixed;bottom:100px;left:26px;z-index:41;
    width:380px;max-width:calc(100vw - 40px);height:520px;max-height:70vh;
    background:var(--panel);border:1px solid #ff3b3b33;border-radius:16px;
    display:flex;flex-direction:column;overflow:hidden;
    box-shadow:0 20px 60px -10px #000000cc;
    transform:translateY(16px);opacity:0;pointer-events:none;transition:all .2s;
  }
  .chat-panel.open{transform:translateY(0);opacity:1;pointer-events:auto;}
  .chat-head{
    padding:14px 16px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:10px;
    background:linear-gradient(180deg,#220a0d,transparent);
  }
  .chat-head .avatar{
    width:34px;height:34px;border-radius:50%;flex-shrink:0;
    background:radial-gradient(circle at 35% 30%,#2a0e12,#0b0304);
    border:1px solid #ff3b3b55;display:flex;align-items:center;justify-content:center;
  }
  .chat-head .avatar .dot{width:9px;height:9px;border-radius:50%;background:var(--redglow);box-shadow:0 0 10px #ff3b3b;}
  .chat-head h4{margin:0;font-family:'Tajawal';font-size:14.5px;}
  .chat-head p{margin:1px 0 0;font-size:11px;color:var(--text-muted);}
  .chat-head .close{margin-right:auto;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;padding:4px;}
 
  .chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
  .msg{max-width:85%;padding:10px 13px;border-radius:12px;font-size:13.5px;line-height:1.75;}
  .msg.user{align-self:flex-end;background:var(--red-dim);border:1px solid #e2263e3a;border-bottom-left-radius:3px;}
  .msg.bot{align-self:flex-start;background:#150a0c;border:1px solid var(--border);border-bottom-right-radius:3px;}
  .msg.bot.thinking{color:var(--text-muted);}
  .typing-dots span{
    display:inline-block;width:5px;height:5px;background:var(--redglow);border-radius:50%;margin-left:3px;
    animation:blink 1.2s infinite;
  }
  .typing-dots span:nth-child(2){animation-delay:.2s;}
  .typing-dots span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,100%{opacity:.25;}50%{opacity:1;}}
 
  .chat-input{
    display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);
  }
  .chat-input input{
    flex:1;background:#0f0608;border:1px solid var(--border);border-radius:9px;
    color:var(--text);padding:10px 12px;font-family:'Cairo';font-size:13.5px;outline:none;
  }
  .chat-input input:focus{border-color:var(--redglow);}
  .chat-input button{
    position:relative;overflow:hidden;
    background:var(--redglow);border:none;border-radius:9px;width:40px;color:#2a0505;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
 
  @media (max-width:560px){
    header{padding:20px 16px 14px;}
    main{padding:20px 16px 120px;}
    .jarvis-btn{left:16px;bottom:18px;}
    .chat-panel{left:16px;right:16px;width:auto;bottom:92px;}
  }
</style>
</head>
<body>
 
<header>
  <div class="brand">
    <div class="brand-mark">J</div>
    <div>
      <h1>Jarvis</h1>
      <p>قاعدة معرفتك اليومية في الشغل</p>
    </div>
  </div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="دور على معلومة سجلتها قبل كدا...">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a3888c" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
  </div>
  <button class="btn-add" onclick="openAddModal()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1a0505" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    إضافة معلومة
  </button>
</header>
 
<main>
  <div class="section-label"><span id="countLabel">0 معلومة متسجلة</span><div class="line"></div></div>
  <div id="grid" class="grid"></div>
  <div id="emptyState" class="empty" style="display:none;">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#a3888c" stroke-width="1.5"><path d="M3 7l9-4 9 4-9 4-9-4Z"/><path d="M3 7v10l9 4 9-4V7"/><path d="M12 11v10"/></svg>
    <h3>لسه مفيش معلومات متسجلة</h3>
    <p>أول ما تتعلم حاجة جديدة، سجلها هنا عشان ترجعلها بسهولة</p>
  </div>
</main>
 
<!-- Add Note Modal -->
<div class="overlay" id="addOverlay">
  <div class="modal">
    <h2>📌 معلومة جديدة</h2>
    <div class="field">
      <label>العنوان (اسم قصير يسهل الرجوع للمعلومة بيه)</label>
      <input type="text" id="titleInput" placeholder="مثال: مراجعة الـ pickup المتأخرة">
    </div>
    <div class="field">
      <label>التفاصيل</label>
      <textarea id="detailsInput" placeholder="اكتب هنا كل خطوة أو تفصيلة اتعلمتها..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveNote()">حفظ المعلومة</button>
      <button class="btn-ghost" onclick="closeAddModal()">إلغاء</button>
    </div>
  </div>
</div>
 
<!-- Note Detail Modal -->
<div class="overlay" id="detailOverlay">
  <div class="modal">
    <h2 id="detailTitle"></h2>
    <div class="detail-meta" id="detailMeta"></div>
    <div class="detail-body" id="detailBody"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeDetailModal()">قفل</button>
      <button class="btn-danger" onclick="deleteCurrentNote()">حذف المعلومة</button>
    </div>
  </div>
</div>
 
<!-- Jarvis Assistant -->
<div class="jarvis-btn" id="jarvisBtn" onclick="toggleChat()">
  <div class="ring"></div>
  <div class="ring2"></div>
  <div class="core"></div>
</div>
 
<div class="chat-panel" id="chatPanel">
  <div class="chat-head">
    <div class="avatar"><div class="dot"></div></div>
    <div>
      <h4>Jarvis</h4>
      <p>بيدور في معلوماتك المسجلة</p>
    </div>
    <button class="close" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-body" id="chatBody"></div>
  <div class="chat-input">
    <input type="text" id="chatInput" placeholder="اسأل... مثلاً: أراجع الـ pickup المتأخرة إزاي؟" onkeydown="if(event.key==='Enter')sendChat()">
    <button onclick="sendChat()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2a0505" stroke-width="2.5"><path d="m22 2-7 20-4-9-9-4 20-7Z"/></svg>
    </button>
  </div>
</div>
 
<script>
let notes = [];
let currentDetailId = null;
let chatHistory = [];
let chatOpened = false;
 
// ---------- Storage ----------
async function loadNotes(){
  try{
    const res = await window.storage.get('notes-list', false);
    notes = res && res.value ? JSON.parse(res.value) : [];
  }catch(e){
    notes = [];
  }
  renderNotes();
}
 
async function persistNotes(){
  try{
    await window.storage.set('notes-list', JSON.stringify(notes), false);
  }catch(e){
    console.error('تعذر حفظ البيانات', e);
  }
}
 
// ---------- Render ----------
function renderNotes(filter=''){
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');
  const q = filter.trim().toLowerCase();
  const filtered = notes.filter(n =>
    !q || n.title.toLowerCase().includes(q) || n.details.toLowerCase().includes(q)
  ).sort((a,b)=> b.createdAt - a.createdAt);
 
  document.getElementById('countLabel').textContent = notes.length + ' معلومة متسجلة';
 
  if(filtered.length === 0){
    grid.innerHTML = '';
    empty.style.display = 'block';
    if(q){
      empty.querySelector('h3').textContent = 'مفيش نتايج';
      empty.querySelector('p').textContent = 'جرب كلمة تانية أو سجل المعلومة دي جديدة';
    } else {
      empty.querySelector('h3').textContent = 'لسه مفيش معلومات متسجلة';
      empty.querySelector('p').textContent = 'أول ما تتعلم حاجة جديدة، سجلها هنا عشان ترجعلها بسهولة';
    }
    return;
  }
  empty.style.display = 'none';
 
  grid.innerHTML = filtered.map(n => `
    <div class="card" onclick="openDetail('${n.id}')">
      <span class="tag-id mono">#${String(n.id).slice(-4)}</span>
      <h3>${escapeHtml(n.title)}</h3>
      <p>${escapeHtml(n.details)}</p>
      <div class="barcode">${barcodeBars()}</div>
    </div>
  `).join('');
}
 
function barcodeBars(){
  let out = '';
  for(let i=0;i<14;i++){
    const h = 5 + Math.floor(Math.random()*9);
    out += `<span style="height:${h}px"></span>`;
  }
  return out;
}
 
function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
 
// ---------- Add Note ----------
function openAddModal(){
  document.getElementById('titleInput').value = '';
  document.getElementById('detailsInput').value = '';
  document.getElementById('addOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('titleInput').focus(), 100);
}
function closeAddModal(){
  document.getElementById('addOverlay').classList.remove('open');
}
async function saveNote(){
  const title = document.getElementById('titleInput').value.trim();
  const details = document.getElementById('detailsInput').value.trim();
  if(!title || !details){
    alert('من فضلك اكتب العنوان والتفاصيل');
    return;
  }
  notes.push({ id: Date.now().toString(), title, details, createdAt: Date.now() });
  await persistNotes();
  renderNotes(document.getElementById('searchInput').value);
  closeAddModal();
}
 
// ---------- Detail / Delete ----------
function openDetail(id){
  const n = notes.find(x => x.id === id);
  if(!n) return;
  currentDetailId = id;
  document.getElementById('detailTitle').textContent = n.title;
  document.getElementById('detailMeta').textContent = 'اتسجلت في ' + new Date(n.createdAt).toLocaleDateString('ar-EG');
  document.getElementById('detailBody').textContent = n.details;
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetailModal(){
  document.getElementById('detailOverlay').classList.remove('open');
  currentDetailId = null;
}
async function deleteCurrentNote(){
  if(!currentDetailId) return;
  notes = notes.filter(n => n.id !== currentDetailId);
  await persistNotes();
  renderNotes(document.getElementById('searchInput').value);
  closeDetailModal();
}
 
// ---------- Search ----------
document.getElementById('searchInput').addEventListener('input', (e)=>{
  renderNotes(e.target.value);
});
 
// ---------- Jarvis Assistant ----------
function toggleChat(){
  const panel = document.getElementById('chatPanel');
  panel.classList.toggle('open');
  if(panel.classList.contains('open') && !chatOpened){
    chatOpened = true;
    addBotMessage('أهلاً بيك 👋 أنا Jarvis، هساعدك تلاقي أي معلومة سجلتها قبل كدا. قولي عايز تعمل إيه بالظبط.');
  }
}
 
function addUserMessage(text){
  const body = document.getElementById('chatBody');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.textContent = text;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}
function addBotMessage(text){
  const body = document.getElementById('chatBody');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.textContent = text;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}
function addThinking(){
  const body = document.getElementById('chatBody');
  const div = document.createElement('div');
  div.className = 'msg bot thinking';
  div.id = 'thinkingMsg';
  div.innerHTML = 'بدور في معلوماتك <span class="typing-dots"><span></span><span></span><span></span></span>';
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}
function removeThinking(){
  const el = document.getElementById('thinkingMsg');
  if(el) el.remove();
}
 
async function sendChat(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  addUserMessage(text);
  chatHistory.push({role:'user', content: text});
  addThinking();
 
  const notesContext = notes.length
    ? notes.map(n => `- العنوان: ${n.title}\n  التفاصيل: ${n.details}`).join('\n\n')
    : 'مفيش أي معلومات متسجلة لسه.';
 
  const systemPrompt = `انت مساعد ذكي جوه موقع داخلي لموظف جديد في شركة شحن، اسمك "Jarvis" واسلوبك زي Jarvis بتاع Iron Man: هادي، واثق، مباشر، ومفيد.
مهمتك إنك تدور في المعلومات اللي الموظف سجلها بنفسه في التطبيق بتاعه، وترد عليه باللهجة المصرية.
 
المعلومات المسجلة حالياً:
${notesContext}
 
قواعد الرد:
- لو لقيت معلومة متسجلة تناسب سؤاله، اشرحله خطوة بخطوة بناءً على اللي هو كاتبه بالظبط، من غير ما تخترع تفاصيل مش موجودة.
- لو المعلومة مش موجودة، قوله بوضوح إنها مش متسجلة عندك، واقترح عليه يضيفها دلوقتي بزرار "إضافة معلومة".
- خليك مختصر ومرتب، استخدم خطوات مرقمة لو الموضوع فيه إجراءات.
- متردش كأنك بتقرأ من قاعدة بيانات، رد كأنك زميل خبير بيفكّره.`;
 
  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: systemPrompt,
        messages: chatHistory
      })
    });
    const data = await response.json();
    const reply = (data.content || [])
      .map(item => item.type === 'text' ? item.text : '')
      .filter(Boolean)
      .join('\n') || 'معلش، حصل خطأ في الرد، جرب تاني.';
 
    removeThinking();
    addBotMessage(reply);
    chatHistory.push({role:'assistant', content: reply});
  }catch(e){
    removeThinking();
    addBotMessage('معلش، مقدرتش أوصل للمساعد دلوقتي. جرب تاني كمان شوية.');
  }
}
 
// ---------- Press / Click Animations ----------
function createRipple(e, el){
  const rect = el.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.width = size + 'px';
  ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
  ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
  el.appendChild(ripple);
  requestAnimationFrame(()=>{
    ripple.style.transform = 'scale(1.8)';
    ripple.style.opacity = '0';
  });
  setTimeout(()=> ripple.remove(), 520);
}

function pulseElement(el){
  el.classList.remove('pulse-anim');
  void el.offsetWidth; // restart animation
  el.classList.add('pulse-anim');
  setTimeout(()=> el.classList.remove('pulse-anim'), 350);
}

function kickJarvis(el){
  el.classList.remove('jarvis-kick');
  void el.offsetWidth;
  el.classList.add('jarvis-kick');
  setTimeout(()=> el.classList.remove('jarvis-kick'), 550);
}

document.addEventListener('click', function(e){
  const rippleTarget = e.target.closest('.btn-add, .btn-primary, .btn-ghost, .btn-danger, .chat-input button, .card');
  if(rippleTarget){
    createRipple(e, rippleTarget);
    pulseElement(rippleTarget);
  }
  const jb = e.target.closest('.jarvis-btn');
  if(jb){
    kickJarvis(jb);
  }
}, true);
 
loadNotes();
</script>
